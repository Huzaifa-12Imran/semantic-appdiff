name: API Semantic Diff

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_v1_url:
        description: "V1 API base URL"
        required: true
      api_v2_url:
        description: "V2 API base URL"
        required: true

jobs:
  apidiff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install apidiff
        run: pip install apidiff

      - name: Capture v1 traffic (baseline)
        run: |
          apidiff capture --mode replay \
            --seed tests/seed_traffic.har \
            --target ${{ env.API_V1_URL || inputs.api_v1_url }} \
            --out /tmp/v1.har

      - name: Capture v2 traffic (candidate)
        run: |
          apidiff capture --mode replay \
            --seed tests/seed_traffic.har \
            --target ${{ env.API_V2_URL || inputs.api_v2_url }} \
            --out /tmp/v2.har

      - name: Run semantic diff
        run: |
          apidiff run \
            --v1-har /tmp/v1.har \
            --v2-har /tmp/v2.har \
            --out-dir ./apidiff-report \
            --fail-on high

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: apidiff-report
          path: ./apidiff-report/
          retention-days: 30
